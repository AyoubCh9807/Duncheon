name: Duncheon Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # Install pnpm for Linux/macOS
      - name: Install pnpm (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          npm install -g pnpm
          echo "$(npm bin -g)" >> $GITHUB_PATH

      # Install pnpm for Windows
      - name: Install pnpm (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: npm install -g pnpm

      - name: Verify pnpm
        run: pnpm -v
        shell: bash

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install OS dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev build-essential pkg-config curl

      - name: Install Dependencies
        run: pnpm install
        shell: bash

      - name: Build Tauri App (Linux/macOS)
        if: runner.os != 'Windows'
        run: pnpm tauri build
        shell: bash

      - name: Build Tauri App (Windows)
        if: runner.os == 'Windows'
        run: |
          rustup target add x86_64-pc-windows-gnu
          pnpm tauri build --target x86_64-pc-windows-gnu
        shell: pwsh

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: duncheon-${{ matrix.os }}
          path: src-tauri/target/release/bundle/